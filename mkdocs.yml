site_name: Oxmiq × AU Internship
site_description: 10-week curriculum on inference engineering, prompt engineering, AI agents & the Capsule platform
site_url: https://oxmiq.github.io/au-curriculum/
repo_url: https://github.com/oxmiq/au-curriculum
repo_name: oxmiq/au-curriculum

docs_dir: docs
use_directory_urls: true

# Source-material citations point outside docs_dir into ../planning/source-material/.
# Those links resolve correctly on GitHub but not on the rendered site, by design.
# audit_lessons.py L007 verifies the targets exist on disk, so mkdocs' own check
# is downgraded to info to keep strict builds green.
validation:
  links:
    not_found: info

theme:
  name: material
  custom_dir: overrides             # Phase B: right-side header actions + status pill
  font: false                       # self-host Oxygen / Oxygen Mono (see stylesheets/oxblood.css) — offline-safe
  logo: assets/OXMIQ-logo-white.png
  favicon: assets/OXMIQ-logo-oxblood.png
  palette:
    scheme: default                 # light; cream + oxblood applied via oxblood.css
  features:
    - navigation.tabs               # verb-style top tabs (Home · Learn · Plan · Reference · My Progress)
    - navigation.tabs.sticky        # keep the tab strip pinned while scrolling lessons
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy

extra_css:
  - stylesheets/oxblood.css
  - stylesheets/cards.css           # Phase C: card-grid + status-pill + lesson-header
  - stylesheets/editorial.css       # ox-self-check widget styles + long-form primitives

# Mermaid is loaded client-side. Material doesn't ship its native mermaid
# integration unless the theme variant supports it; the small init script below
# initialises any <pre class="mermaid"> blocks emitted by pymdownx.superfences.
extra_javascript:
  - assets/mermaid-init.js
  - assets/widgets/self-check.js    # ox-self-check MCQ formative widget

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight

# Verb-style top tabs (Phase A). Top-level entries with children become tabs;
# the curriculum's 10 weeks now nest under "Learn" so the sidebar tree only
# shows when that tab is active.
nav:
