# Phase D: build-time hook that swaps {status:week-XX/module-Y} tokens with
# status pills derived from docs/progress/summary.json, and emits
# docs/assets/status.json for the header partial (Phase B).
hooks:
  - hooks/progress_badges.py

# Linked from lesson pages, intentionally not a sidebar entry.
not_in_nav: |
  /lessons/**/assignment.md
  /lessons/**/knowledge-check.html
  /lessons/**/supplementary-*.md
