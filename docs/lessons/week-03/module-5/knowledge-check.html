<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiz — Week 3 · KV Cache, Attention, Quantization</title>
<style>
  :root{
    --bg:#0b0d10;--surface:#14171d;--surface-2:#1b1f27;--line:rgba(255,255,255,.08);
    --text:#e7e9ee;--muted:#8b91a0;--faint:#5b616e;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    --ok:#34d399;--bad:#fb7185;--accent:#22d3ee;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.5;padding:40px 20px 80px}
  .wrap{max-width:720px;margin:0 auto}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin:0 0 6px}
  h1{font-family:var(--mono);font-weight:600;font-size:22px;margin:0 0 4px}
  .sub{color:var(--muted);font-size:13px;margin:0 0 24px}
  .q{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:14px}
  .q .stem{font-weight:600;margin:0 0 14px}
  .q .num{font-family:var(--mono);color:var(--faint);font-size:12px;margin-right:8px}
  label.opt{display:flex;gap:10px;align-items:flex-start;padding:9px 12px;border:1px solid var(--line);border-radius:8px;margin-bottom:8px;cursor:pointer}
  label.opt:hover{background:var(--surface-2)}
  label.opt input{margin-top:3px;accent-color:var(--accent)}
  .q.correct{border-color:color-mix(in srgb,var(--ok) 50%,transparent)}
  .q.wrong{border-color:color-mix(in srgb,var(--bad) 50%,transparent)}
  .explain{font-size:13px;color:var(--muted);margin:10px 0 0;padding-top:10px;border-top:1px solid var(--line);display:none}
  .q.graded .explain{display:block}
  .mark{font-family:var(--mono);font-size:12px;margin-left:8px}
  .mark.ok{color:var(--ok)} .mark.bad{color:var(--bad)}
  button{font-family:var(--mono);font-size:14px;background:var(--accent);color:#04181c;border:0;border-radius:8px;padding:11px 20px;cursor:pointer;font-weight:600}
  button:hover{filter:brightness(1.08)}
  #result{margin-top:18px;font-family:var(--mono);font-size:15px;display:none}
  #result.show{display:block}
  #result .score{font-size:24px;font-weight:600}
  .verdict-pass{color:var(--ok)} .verdict-fail{color:var(--bad)}
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow" id="eyebrow"></p>
  <h1 id="title"></h1>
  <p class="sub" id="sub"></p>
  <div id="quiz"></div>
  <button id="check">Check answers</button>
  <div id="result"></div>
</div>

<script>
const QUIZ = {
  module: "week-03/module-5",
  title: "Week 3 · KV Cache, Attention, Quantization (Friday canonical)",
  pass: 0.66,
  questions: [
    { stem: "TTFT (Time To First Token) is most directly driven by:",
      options: ["Decode speed","Prefill speed","Tokenization","Network round-trip"], answer: 1,
      explain: "Prefill processes all input tokens to produce the first output token; that's what the user sees first." },
    { stem: "Decode for a single user is bottlenecked by:",
      options: ["Tensor Core throughput","HBM bandwidth","CPU","Network"], answer: 1,
      explain: "Memory-bound — each token re-reads all model weights from HBM." },
    { stem: "The KV cache stores:",
      options: ["Final output logits","Keys and values from prior tokens, per layer","Activations from prior layers","Embedding table"], answer: 1,
      explain: "Each layer caches the K,V tensors it computed for every previously seen token." },
    { stem: "Llama-3.1-8B with 8 KV heads, head_dim 128, 32 layers, FP16: KV cache per token is roughly:",
      options: ["4 KB","128 KB","1 MB","16 MB"], answer: 1,
      explain: "Per-layer: 2 × 8 × 128 × 2 = 4 KB. Times 32 layers = 128 KB per token." },
    { stem: "At what context length does Llama-3-8B's KV cache approximately equal the model weight memory (16 GB)?",
      options: ["4K","32K","128K","1M"], answer: 2,
      explain: "128 KB/token × 131072 tokens = 16 GB — matches model size." },
    { stem: "FlashAttention's speedup comes from:",
      options: ["Lower-precision math","Avoiding materializing the N×N attention matrix in HBM","Skipping softmax","Approximate attention"], answer: 1,
      explain: "Tile in SRAM + online softmax → HBM traffic drops from O(N²) to O(N). Same answer." },
    { stem: "Is FlashAttention lossy?",
      options: ["Yes, slightly","No — bit-identical output","Only for long context","Only with FP8"], answer: 1,
      explain: "Pure systems trick. Same softmax, same precision, same numbers." },
    { stem: "PagedAttention is most analogous to:",
      options: ["CPU branch prediction","OS virtual memory paging","TCP windowing","GPU shared memory"], answer: 1,
      explain: "KV cache blocks + per-request page table = OS-style virtual addressing for the cache." },
    { stem: "PagedAttention primarily attacks:",
      options: ["Per-token compute cost","KV-cache memory fragmentation","Network latency","Tokenization overhead"], answer: 1,
      explain: "Eliminates worst-case contiguous reservations → much higher HBM utilization → more concurrent users." },
    { stem: "FP8 weights vs FP16 weights, on a memory-bound decode workload, gives roughly:",
      options: ["No speedup","~2× speedup","~10× speedup","Slower (more overhead)"], answer: 1,
      explain: "Half the bytes per token → roughly halves the HBM-bound time." },
    { stem: "At the same bit count, FP8 is usually preferred over INT8 for LLM weights because:",
      options: ["FP8 is faster on all hardware","Floats handle outlier values better than ints","INT8 isn't supported on H100","FP8 uses less memory"], answer: 1,
      explain: "Float spreads precision across magnitudes; activations are heavy-tailed, ints clip or waste range." },
    { stem: "Which of these is most sensitive to quantization (degrades quality first)?",
      options: ["Model weights","KV cache","Activations / attention output","All equally"], answer: 2,
      explain: "Order of sensitivity: weights (least) → KV → activations → attention output (most)." },
    { stem: "Combining FlashAttention + PagedAttention + FP8 weights gives you:",
      options: ["Lower-quality model","Same model, much higher throughput at long context","A different model architecture","A new training method"], answer: 1,
      explain: "All three are inference-time wins; the model itself is unchanged (FlashAttention/PagedAttention) or numerically close (FP8)." },
    { stem: "True/false: prefill of 1000 tokens generates 1000 output tokens.",
      options: ["True","False — prefill processes the prompt and produces just the first output token"], answer: 1,
      explain: "Prefill = parallel forward pass over the prompt, ending with one output token. Decode loops thereafter." },
    { stem: "Why is the KV cache the resource that defines a modern serving stack?",
      options: ["It's the only thing on the GPU","It grows with context, can exceed model weights, and competes with batch size for HBM","It runs on CPU","It is required only at training time"], answer: 1,
      explain: "Every modern trick — paging, prefix sharing, FP8 KV, disaggregation — is about KV-cache management." }
  ]
};

const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

$("#eyebrow").textContent = "Canonical quiz · the bar";
$("#title").textContent = QUIZ.title;
$("#sub").textContent = `${QUIZ.questions.length} questions · pass ${Math.round(QUIZ.pass*100)}%`;

$("#quiz").innerHTML = QUIZ.questions.map((q,i)=>`
  <div class="q" id="q${i}">
    <p class="stem"><span class="num">Q${i+1}</span>${esc(q.stem)}<span class="mark" id="m${i}"></span></p>
    ${q.options.map((o,j)=>`
      <label class="opt"><input type="radio" name="q${i}" value="${j}"><span>${esc(o)}</span></label>`).join("")}
    <p class="explain">${esc(q.explain)}</p>
  </div>`).join("");

$("#check").addEventListener("click",()=>{
  let correct=0;
  QUIZ.questions.forEach((q,i)=>{
    const picked=document.querySelector(`input[name="q${i}"]:checked`);
    const qel=$("#q"+i), mel=$("#m"+i);
    qel.classList.add("graded");
    const ok = picked && Number(picked.value)===q.answer;
    if(ok){correct++;qel.classList.add("correct");qel.classList.remove("wrong");mel.textContent="✓ correct";mel.className="mark ok";}
    else{qel.classList.add("wrong");qel.classList.remove("correct");mel.textContent=picked?"✗ incorrect":"— no answer";mel.className="mark bad";}
  });
  const total=QUIZ.questions.length, passed=correct/total>=QUIZ.pass;
  const r=$("#result"); r.classList.add("show");
  r.innerHTML=`<div class="score">${correct} / ${total}</div>
    <div class="${passed?"verdict-pass":"verdict-fail"}">${passed?"PASSED — record it and move on":"below the bar — review the lesson and retry"}</div>`;
  r.scrollIntoView({behavior:"smooth",block:"nearest"});
});
</script>
</body>
</html>
