<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiz — Week 8 · Capsule Foundations & Operations</title>
<style>
  :root{--bg:#0b0d10;--surface:#14171d;--surface-2:#1b1f27;--line:rgba(255,255,255,.08);--text:#e7e9ee;--muted:#8b91a0;--faint:#5b616e;--mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;--ok:#34d399;--bad:#fb7185;--accent:#22d3ee;}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.5;padding:40px 20px 80px}
  .wrap{max-width:720px;margin:0 auto}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin:0 0 6px}
  h1{font-family:var(--mono);font-weight:600;font-size:22px;margin:0 0 4px} .sub{color:var(--muted);font-size:13px;margin:0 0 24px}
  .q{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:14px}
  .q .stem{font-weight:600;margin:0 0 14px} .q .num{font-family:var(--mono);color:var(--faint);font-size:12px;margin-right:8px}
  label.opt{display:flex;gap:10px;align-items:flex-start;padding:9px 12px;border:1px solid var(--line);border-radius:8px;margin-bottom:8px;cursor:pointer}
  label.opt:hover{background:var(--surface-2)} label.opt input{margin-top:3px;accent-color:var(--accent)}
  .q.correct{border-color:color-mix(in srgb,var(--ok) 50%,transparent)} .q.wrong{border-color:color-mix(in srgb,var(--bad) 50%,transparent)}
  .explain{font-size:13px;color:var(--muted);margin:10px 0 0;padding-top:10px;border-top:1px solid var(--line);display:none}
  .q.graded .explain{display:block} .mark{font-family:var(--mono);font-size:12px;margin-left:8px}
  .mark.ok{color:var(--ok)} .mark.bad{color:var(--bad)}
  button{font-family:var(--mono);font-size:14px;background:var(--accent);color:#04181c;border:0;border-radius:8px;padding:11px 20px;cursor:pointer;font-weight:600}
  button:hover{filter:brightness(1.08)} #result{margin-top:18px;font-family:var(--mono);font-size:15px;display:none} #result.show{display:block}
  #result .score{font-size:24px;font-weight:600} .verdict-pass{color:var(--ok)} .verdict-fail{color:var(--bad)}
</style>
</head>
<body>
<div class="wrap"><p class="eyebrow" id="eyebrow"></p><h1 id="title"></h1><p class="sub" id="sub"></p><div id="quiz"></div><button id="check">Check answers</button><div id="result"></div></div>
<script>
const QUIZ = {
  module: "week-08/module-5",
  title: "Week 8 · Capsule Foundations & Operations (Friday canonical)",
  pass: 0.66,
  questions: [
    { stem: "The three layers of Capsule architecture are:", options: ["Frontend / Backend / DB","CLI / Control plane / Node agent","CPU / GPU / NIC","Compile / Link / Run"], answer: 1, explain: "CLI → control plane → node agent. Brokered, identity-aware." },
    { stem: "After installing the CLI, the first command to verify install + identity is:", options: ["capsule connect","capsule whoami","capsule node list","ssh"], answer: 1, explain: "`whoami` confirms the token works against the control plane." },
    { stem: "An environment is best described as:", options: ["A single GPU","A logical grouping of nodes with policy + shared storage","Your terminal","A Kubernetes cluster"], answer: 1, explain: "Per-site or per-class fleet of nodes." },
    { stem: "Capability filtering (e.g. `--gpu h100 --min-gpus 8`) is preferred over name-based filtering because:", options: ["Faster typing","Survives hardware churn and is explicit about real requirements","Required by Capsule","Naming is broken"], answer: 1, explain: "Names change; capabilities are stable." },
    { stem: "A lease is:", options: ["Permanent ownership","Time-bounded reservation of a node","A connection","An environment"], answer: 1, explain: "Renewable, releaseable, audited with a reason field." },
    { stem: "`capsule connect` differs from raw SSH primarily by:", options: ["Identity from CLI auth, brokered, audited, no key management","Faster bytes","Better colors","Less secure"], answer: 0, explain: "All four properties; key management overhead disappears." },
    { stem: "First command after `capsule connect <node>` should be:", options: ["rm -rf /","nvidia-smi","tmux a || tmux new -s work","sudo apt update"], answer: 2, explain: "Survive network blips; never lose long runs." },
    { stem: "A 140 GB model checkpoint belongs in:", options: ["Email","Your home dir on the node","Shared storage pool","Git"], answer: 2, explain: "Home is small + per-node; shared is large + visible to all nodes." },
    { stem: "Streaming output (`capsule run --stream`) beats post-hoc log scraping because:", options: ["You see live output and can abort early on obvious failures","Faster GPU","No reason","Required by SOC2"], answer: 0, explain: "Save GPU-hours by catching typo'd configs in 30 seconds." },
    { stem: "Daily file workflow for a benchmark run is roughly:", options: ["Email files to yourself","lease → cp config → run --stream → storage get report → release","Reboot node","Use git only"], answer: 1, explain: "Lease, push small config, stream the run, pull report, release." },
    { stem: "`capsule connect` hangs forever — most likely cause:", options: ["Capsule bug","Corporate proxy mangling websockets; set HTTPS_PROXY","Disk full","Wrong env"], answer: 1, explain: "Top install/connect quirk (Module 10)." },
    { stem: "Mid-session your node goes `unhealthy` and connection drops. Your long-running benchmark in tmux is:", options: ["Definitely lost","Likely still running once the agent recovers; reattach with `tmux a`","Sent to email","Migrated automatically"], answer: 1, explain: "Tmux survives transient agent restarts as long as the process wasn't killed." },
    { stem: "Two users see the same node leased to both of them. Correct action:", options: ["Ignore","File a bug report — scheduler race","Reboot the node","Yell"], answer: 1, explain: "Day 40: actionable bug with reproduction + logs." },
    { stem: "A good bug report contains at minimum:", options: ["A complaint","Reproduction steps, expected vs actual, logs, environment, hypothesis","Just a screenshot","The word `bug`"], answer: 1, explain: "The five mandatory fields — anything less wastes the maintainer's time." },
    { stem: "By Friday of Week 8 you can draw:", options: ["Nothing","The 3-layer Capsule architecture and map each layer to your Week 1–7 concepts","Only NVIDIA chips","A Kubernetes diagram"], answer: 1, explain: "Goal of the week — operational fluency + architectural mental model." }
  ]
};
const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
$("#eyebrow").textContent = "Canonical quiz · the bar"; $("#title").textContent = QUIZ.title;
$("#sub").textContent = `${QUIZ.questions.length} questions · pass ${Math.round(QUIZ.pass*100)}%`;
$("#quiz").innerHTML = QUIZ.questions.map((q,i)=>`<div class="q" id="q${i}"><p class="stem"><span class="num">Q${i+1}</span>${esc(q.stem)}<span class="mark" id="m${i}"></span></p>${q.options.map((o,j)=>`<label class="opt"><input type="radio" name="q${i}" value="${j}"><span>${esc(o)}</span></label>`).join("")}<p class="explain">${esc(q.explain)}</p></div>`).join("");
$("#check").addEventListener("click",()=>{ let correct=0; QUIZ.questions.forEach((q,i)=>{ const picked=document.querySelector(`input[name="q${i}"]:checked`); const qel=$("#q"+i), mel=$("#m"+i); qel.classList.add("graded"); const ok = picked && Number(picked.value)===q.answer; if(ok){correct++;qel.classList.add("correct");qel.classList.remove("wrong");mel.textContent="✓ correct";mel.className="mark ok";} else{qel.classList.add("wrong");qel.classList.remove("correct");mel.textContent=picked?"✗ incorrect":"— no answer";mel.className="mark bad";} }); const total=QUIZ.questions.length, passed=correct/total>=QUIZ.pass; const r=$("#result"); r.classList.add("show"); r.innerHTML=`<div class="score">${correct} / ${total}</div><div class="${passed?"verdict-pass":"verdict-fail"}">${passed?"PASSED":"below the bar — review the lesson and retry"}</div>`; r.scrollIntoView({behavior:"smooth",block:"nearest"}); });
</script>
</body>
</html>
