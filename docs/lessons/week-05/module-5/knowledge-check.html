<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Phase 1 Assessment — Week 5</title>
<style>
  :root{--bg:#0b0d10;--surface:#14171d;--surface-2:#1b1f27;--line:rgba(255,255,255,.08);--text:#e7e9ee;--muted:#8b91a0;--faint:#5b616e;--mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;--ok:#34d399;--bad:#fb7185;--accent:#22d3ee;}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.5;padding:40px 20px 80px}
  .wrap{max-width:720px;margin:0 auto}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin:0 0 6px}
  h1{font-family:var(--mono);font-weight:600;font-size:22px;margin:0 0 4px} .sub{color:var(--muted);font-size:13px;margin:0 0 24px}
  .q{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:14px}
  .q .stem{font-weight:600;margin:0 0 14px} .q .num{font-family:var(--mono);color:var(--faint);font-size:12px;margin-right:8px}
  label.opt{display:flex;gap:10px;align-items:flex-start;padding:9px 12px;border:1px solid var(--line);border-radius:8px;margin-bottom:8px;cursor:pointer}
  label.opt:hover{background:var(--surface-2)} label.opt input{margin-top:3px;accent-color:var(--accent)}
  .q.correct{border-color:color-mix(in srgb,var(--ok) 50%,transparent)} .q.wrong{border-color:color-mix(in srgb,var(--bad) 50%,transparent)}
  .explain{font-size:13px;color:var(--muted);margin:10px 0 0;padding-top:10px;border-top:1px solid var(--line);display:none}
  .q.graded .explain{display:block} .mark{font-family:var(--mono);font-size:12px;margin-left:8px}
  .mark.ok{color:var(--ok)} .mark.bad{color:var(--bad)}
  button{font-family:var(--mono);font-size:14px;background:var(--accent);color:#04181c;border:0;border-radius:8px;padding:11px 20px;cursor:pointer;font-weight:600}
  button:hover{filter:brightness(1.08)} #result{margin-top:18px;font-family:var(--mono);font-size:15px;display:none} #result.show{display:block}
  #result .score{font-size:24px;font-weight:600} .verdict-pass{color:var(--ok)} .verdict-fail{color:var(--bad)}
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow" id="eyebrow"></p><h1 id="title"></h1><p class="sub" id="sub"></p>
  <div id="quiz"></div><button id="check">Check answers</button><div id="result"></div>
</div>
<script>
/* Open-book Phase 1 assessment — reasoning-focused, drawn from Problem Sets ☆ stretch (Sets 11–24). */
const QUIZ = {
  module: "week-05/module-5",
  title: "Phase 1 Assessment · Week 5 (open-book, 15% of grade)",
  pass: 0.66,
  questions: [
    { stem: "A chat product reports P50 TTFT = 80 ms, P99 TTFT = 4200 ms. The most likely cause is:", options: ["Slow GPU","Queueing or batching tail under load","Cold start","Bad prompt"], answer: 1,
      explain: "P99/P50 > 5× signals tail behaviour: queue depth or batch boundaries, not raw compute speed." },
    { stem: "You compress a 70B model FP16 → FP8. Decode throughput should:", options: ["Stay the same","Roughly double","Halve","Drop 10×"], answer: 1,
      explain: "Half the bytes per token on memory-bound decode ≈ 2× throughput." },
    { stem: "For a request with 100 input / 5000 output tokens, what dominates wall-clock?", options: ["Prefill","Decode","Tokenization","Network"], answer: 1,
      explain: "5000 sequential decode steps swamp the one parallel prefill." },
    { stem: "TP=8 on 8×H100 instead of TP=4 on 4×H100 (same model that fits both): primary benefit is:", options: ["Lower decode latency (less per-GPU weight to read)","Higher quality","Lower cost","Smaller model"], answer: 0,
      explain: "Decode latency drops roughly linearly with TP because per-GPU weight bytes drop." },
    { stem: "Continuous batching gives ~5–10× throughput over static batching because:", options: ["Better GPU drivers","Requests admit at every decode step, no waiting at batch boundaries; GPU stays full","Tensor Cores get faster","Smaller model"], answer: 1,
      explain: "Static batching wastes idle time between batches and on tail-output requests." },
    { stem: "Speculative decoding produces output that is:", options: ["Slightly different","Provably identical to vanilla sampling from the target model","Always worse","Faster but lower quality"], answer: 1,
      explain: "Under speculative sampling — identical distribution. Pure systems win." },
    { stem: "Which is the MOST honest single quality metric for shipping a quantization change?", options: ["Perplexity","MMLU","Your own task-eval pass rate + side-by-side win rate","Loss"], answer: 2,
      explain: "Public benchmarks are gameable / overfit; task evals reflect your customers." },
    { stem: "Goodhart's Law applied to LLM serving means:", options: ["Measure more","Once you bonus a single metric, behaviour will optimize for that metric at the cost of others; report a vector with percentiles","Trust averages","Use only P50"], answer: 1,
      explain: "Always report a vector of metrics with percentiles, not a single number." },
    { stem: "PagedAttention's contribution is best described as:", options: ["Better attention math","OS-style virtual paging for KV cache, eliminating fragmentation","Quantization","Speculation"], answer: 1,
      explain: "Fixed-size KV blocks + per-request block table = OS paging analogy." },
    { stem: "Choose the right deployment for: bursty internal tool, ~5% GPU utilization, no privacy constraints:", options: ["Dedicated 8×H100","Hosted API per-token","Pipeline parallelism","Build your own GPU"], answer: 1,
      explain: "Low-utilization workloads — APIs are dramatically cheaper than idle dedicated GPUs." },
    { stem: "Llama-3-70B FP8 weights on 8×H100 with NVLink, TP=8: per-GPU weight shard is:", options: ["140 GB","70 GB","17.5 GB","8.75 GB"], answer: 3,
      explain: "70B params × 1 byte FP8 = 70 GB; / 8 = 8.75 GB per shard." },
    { stem: "A new vLLM version arrives. Best rollout strategy:", options: ["Push to production immediately","Canary 1% → 10% → 100% with metrics gates","Replace the model at the same time","Skip evaluation"], answer: 1,
      explain: "Canary catches regressions early; never combine engine + model changes." },
    { stem: "Cold start for a fresh 70B-FP16 replica is typically:", options: ["100 ms","1–2 sec","1–5 min","Hours"], answer: 2,
      explain: "Pull image (10s of GB), load weights into HBM, warm kernels — minutes." },
    { stem: "Mixtral 8x7B is described as 'top-2 of 8 experts.' Per token, active params ≈:", options: ["7B","13B","47B","56B"], answer: 1,
      explain: "Two ~7B expert MLPs + shared attention ≈ 13B active per token." },
    { stem: "FlashAttention + PagedAttention together are most important for which workload?", options: ["Short-context, single-stream","Long-context, high-concurrency serving","Training","Embedding generation"], answer: 1,
      explain: "FlashAttention kills per-step HBM traffic; PagedAttention enables high concurrency without fragmentation. Both shine at long context + many users." }
  ]
};
const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
$("#eyebrow").textContent = "Phase 1 assessment · open book · 15%"; $("#title").textContent = QUIZ.title;
$("#sub").textContent = `${QUIZ.questions.length} questions · pass ${Math.round(QUIZ.pass*100)}%`;
$("#quiz").innerHTML = QUIZ.questions.map((q,i)=>`<div class="q" id="q${i}"><p class="stem"><span class="num">Q${i+1}</span>${esc(q.stem)}<span class="mark" id="m${i}"></span></p>${q.options.map((o,j)=>`<label class="opt"><input type="radio" name="q${i}" value="${j}"><span>${esc(o)}</span></label>`).join("")}<p class="explain">${esc(q.explain)}</p></div>`).join("");
$("#check").addEventListener("click",()=>{ let correct=0; QUIZ.questions.forEach((q,i)=>{ const picked=document.querySelector(`input[name="q${i}"]:checked`); const qel=$("#q"+i), mel=$("#m"+i); qel.classList.add("graded"); const ok = picked && Number(picked.value)===q.answer; if(ok){correct++;qel.classList.add("correct");qel.classList.remove("wrong");mel.textContent="✓ correct";mel.className="mark ok";} else{qel.classList.add("wrong");qel.classList.remove("correct");mel.textContent=picked?"✗ incorrect":"— no answer";mel.className="mark bad";} }); const total=QUIZ.questions.length, passed=correct/total>=QUIZ.pass; const r=$("#result"); r.classList.add("show"); r.innerHTML=`<div class="score">${correct} / ${total}</div><div class="${passed?"verdict-pass":"verdict-fail"}">${passed?"PASSED Phase 1":"below the bar — review Weeks 2–5 and retry"}</div>`; r.scrollIntoView({behavior:"smooth",block:"nearest"}); });
</script>
</body>
</html>
