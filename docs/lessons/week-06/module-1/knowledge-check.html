<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiz — Week 6 · Prompt Engineering</title>
<style>
  :root{--bg:#0b0d10;--surface:#14171d;--surface-2:#1b1f27;--line:rgba(255,255,255,.08);--text:#e7e9ee;--muted:#8b91a0;--faint:#5b616e;--mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;--ok:#34d399;--bad:#fb7185;--accent:#22d3ee;}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.5;padding:40px 20px 80px}
  .wrap{max-width:720px;margin:0 auto}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin:0 0 6px}
  h1{font-family:var(--mono);font-weight:600;font-size:22px;margin:0 0 4px} .sub{color:var(--muted);font-size:13px;margin:0 0 24px}
  .q{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:14px}
  .q .stem{font-weight:600;margin:0 0 14px} .q .num{font-family:var(--mono);color:var(--faint);font-size:12px;margin-right:8px}
  label.opt{display:flex;gap:10px;align-items:flex-start;padding:9px 12px;border:1px solid var(--line);border-radius:8px;margin-bottom:8px;cursor:pointer}
  label.opt:hover{background:var(--surface-2)} label.opt input{margin-top:3px;accent-color:var(--accent)}
  .q.correct{border-color:color-mix(in srgb,var(--ok) 50%,transparent)} .q.wrong{border-color:color-mix(in srgb,var(--bad) 50%,transparent)}
  .explain{font-size:13px;color:var(--muted);margin:10px 0 0;padding-top:10px;border-top:1px solid var(--line);display:none}
  .q.graded .explain{display:block} .mark{font-family:var(--mono);font-size:12px;margin-left:8px}
  .mark.ok{color:var(--ok)} .mark.bad{color:var(--bad)}
  button{font-family:var(--mono);font-size:14px;background:var(--accent);color:#04181c;border:0;border-radius:8px;padding:11px 20px;cursor:pointer;font-weight:600}
  button:hover{filter:brightness(1.08)} #result{margin-top:18px;font-family:var(--mono);font-size:15px;display:none} #result.show{display:block}
  #result .score{font-size:24px;font-weight:600} .verdict-pass{color:var(--ok)} .verdict-fail{color:var(--bad)}
</style>
</head>
<body>
<div class="wrap"><p class="eyebrow" id="eyebrow"></p><h1 id="title"></h1><p class="sub" id="sub"></p><div id="quiz"></div><button id="check">Check answers</button><div id="result"></div></div>
<script>
const QUIZ = {
  module: "week-06/module-1",
  title: "Week 6 · Prompt Engineering (Friday canonical)",
  pass: 0.66,
  questions: [
    { stem: "The five (or six) components every well-formed prompt should have are:", options: ["Role, context, task, input, format, constraints","Role, model, temperature, prompt, output","Just be polite","Question + examples"], answer: 0,
      explain: "Missing any of these and the model guesses badly." },
    { stem: "Why does giving the model a role like 'You are a senior security engineer' help?", options: ["Models cost less in roles","It concentrates the model on relevant patterns in its training distribution","It changes the underlying model","Required by the API"], answer: 1,
      explain: "Free quality lift — narrows the model's distribution toward the relevant subspace." },
    { stem: "Wrapping untrusted user data in `<document>...</document>` tags primarily defends against:", options: ["Latency","Prompt injection","Quantization error","Cold starts"], answer: 1,
      explain: "Tells the model to treat content as data, not instructions; trained-in respect for delimiter conventions." },
    { stem: "Chain-of-Thought ('think step by step') primarily improves:", options: ["Cost","Multi-step reasoning accuracy","Tokenization","Caching"], answer: 1,
      explain: "Writing reasoning gives the model more decode steps and context to commit to a correct answer." },
    { stem: "The main cost of CoT is:", options: ["Lower accuracy","More output tokens — more decode time and $ per request","Worse safety","Less context"], answer: 1,
      explain: "Output tokens are the dominant decode cost (Week 2). CoT often 3–10× them." },
    { stem: "Few-shot prompting works because:", options: ["The model is fine-tuned in-context","The model pattern-matches the input→output shape demonstrated in the examples (in-context learning)","JSON is easier","More tokens = better"], answer: 1,
      explain: "Especially good at teaching format and style without weight updates." },
    { stem: "Few-shot examples that all share an irrelevant feature (e.g. all positives mention rain):", options: ["Help model focus","Teach the model the wrong rule — bias risk","Reduce cost","Improve safety"], answer: 1,
      explain: "Vary examples on irrelevant dimensions; keep them representative." },
    { stem: "If each prompt in a 3-step chain is 90% reliable, end-to-end success rate is:", options: ["90%","81%","72.9%","100%"], answer: 2,
      explain: "0.9³ ≈ 0.729. Multiplicative — why agents need ≥95% per step." },
    { stem: "Most cost-effective hallucination guardrail is:", options: ["Bigger model","Adding 'If the answer isn't in the source, say I don\\'t know'","Quantize to FP8","Use TGI"], answer: 1,
      explain: "Free, single sentence, often catches 30%+ of confidently-wrong outputs." },
    { stem: "Why ask for JSON output in production?", options: ["Faster","Machine-parseable + schema-validatable; lets code consume results reliably","More creative","Required by HTTP"], answer: 1,
      explain: "Pair with explicit schema; parse defensively; re-prompt on validation failure." },
    { stem: "XML-style tagging in agent contexts is often preferred over JSON because:", options: ["XML is faster","More forgiving to parse, easier to mix prose + structure, better tolerated by current models","JSON isn't supported","Required for tools"], answer: 1,
      explain: "Less brittle than JSON; one missing quote doesn't break a parse." },
    { stem: "A prompt eval suite is most like:", options: ["A benchmark","A unit-test suite for prompts","An MMLU score","A monitoring dashboard"], answer: 1,
      explain: "Inputs + expected outputs; run on every prompt change; block deploys on regression." },
    { stem: "LLM-as-a-judge is most trustworthy for:", options: ["Subjective quality","Format compliance and pairwise comparisons with reference","Math correctness","Safety scoring"], answer: 1,
      explain: "Use real solvers for math; specialized classifiers for safety; human spot-checks always." },
    { stem: "Combining CoT + few-shot together is most powerful when you show:", options: ["More examples","Examples that include the reasoning, not just the answer","No reasoning","Random examples"], answer: 1,
      explain: "Teaches reasoning *style*, not just answer style." },
    { stem: "The single most important shift Week 6 makes is:", options: ["Bigger prompts","Treating prompts as engineered, versioned, evaluated artifacts","Using fewer tokens","Avoiding system prompts"], answer: 1,
      explain: "Production prompts have schemas, eval suites, guardrails, owners." }
  ]
};
const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
$("#eyebrow").textContent = "Canonical quiz · the bar"; $("#title").textContent = QUIZ.title;
$("#sub").textContent = `${QUIZ.questions.length} questions · pass ${Math.round(QUIZ.pass*100)}%`;
$("#quiz").innerHTML = QUIZ.questions.map((q,i)=>`<div class="q" id="q${i}"><p class="stem"><span class="num">Q${i+1}</span>${esc(q.stem)}<span class="mark" id="m${i}"></span></p>${q.options.map((o,j)=>`<label class="opt"><input type="radio" name="q${i}" value="${j}"><span>${esc(o)}</span></label>`).join("")}<p class="explain">${esc(q.explain)}</p></div>`).join("");
$("#check").addEventListener("click",()=>{ let correct=0; QUIZ.questions.forEach((q,i)=>{ const picked=document.querySelector(`input[name="q${i}"]:checked`); const qel=$("#q"+i), mel=$("#m"+i); qel.classList.add("graded"); const ok = picked && Number(picked.value)===q.answer; if(ok){correct++;qel.classList.add("correct");qel.classList.remove("wrong");mel.textContent="✓ correct";mel.className="mark ok";} else{qel.classList.add("wrong");qel.classList.remove("correct");mel.textContent=picked?"✗ incorrect":"— no answer";mel.className="mark bad";} }); const total=QUIZ.questions.length, passed=correct/total>=QUIZ.pass; const r=$("#result"); r.classList.add("show"); r.innerHTML=`<div class="score">${correct} / ${total}</div><div class="${passed?"verdict-pass":"verdict-fail"}">${passed?"PASSED":"below the bar — review the lesson and retry"}</div>`; r.scrollIntoView({behavior:"smooth",block:"nearest"}); });
</script>
</body>
</html>
