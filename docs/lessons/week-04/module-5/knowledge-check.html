<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiz — Week 4 · Scaling & Stacks</title>
<style>
  :root{--bg:#0b0d10;--surface:#14171d;--surface-2:#1b1f27;--line:rgba(255,255,255,.08);--text:#e7e9ee;--muted:#8b91a0;--faint:#5b616e;--mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;--ok:#34d399;--bad:#fb7185;--accent:#22d3ee;}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.5;padding:40px 20px 80px}
  .wrap{max-width:720px;margin:0 auto}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin:0 0 6px}
  h1{font-family:var(--mono);font-weight:600;font-size:22px;margin:0 0 4px} .sub{color:var(--muted);font-size:13px;margin:0 0 24px}
  .q{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:14px}
  .q .stem{font-weight:600;margin:0 0 14px} .q .num{font-family:var(--mono);color:var(--faint);font-size:12px;margin-right:8px}
  label.opt{display:flex;gap:10px;align-items:flex-start;padding:9px 12px;border:1px solid var(--line);border-radius:8px;margin-bottom:8px;cursor:pointer}
  label.opt:hover{background:var(--surface-2)} label.opt input{margin-top:3px;accent-color:var(--accent)}
  .q.correct{border-color:color-mix(in srgb,var(--ok) 50%,transparent)} .q.wrong{border-color:color-mix(in srgb,var(--bad) 50%,transparent)}
  .explain{font-size:13px;color:var(--muted);margin:10px 0 0;padding-top:10px;border-top:1px solid var(--line);display:none}
  .q.graded .explain{display:block} .mark{font-family:var(--mono);font-size:12px;margin-left:8px}
  .mark.ok{color:var(--ok)} .mark.bad{color:var(--bad)}
  button{font-family:var(--mono);font-size:14px;background:var(--accent);color:#04181c;border:0;border-radius:8px;padding:11px 20px;cursor:pointer;font-weight:600}
  button:hover{filter:brightness(1.08)} #result{margin-top:18px;font-family:var(--mono);font-size:15px;display:none} #result.show{display:block}
  #result .score{font-size:24px;font-weight:600} .verdict-pass{color:var(--ok)} .verdict-fail{color:var(--bad)}
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow" id="eyebrow"></p><h1 id="title"></h1><p class="sub" id="sub"></p>
  <div id="quiz"></div><button id="check">Check answers</button><div id="result"></div>
</div>
<script>
const QUIZ = {
  module: "week-04/module-5",
  title: "Week 4 · Scaling & Stacks (Friday canonical)",
  pass: 0.66,
  questions: [
    { stem: "Tensor parallelism is most beneficial because it:", options: ["Adds more memory","Splits each layer's weights across GPUs, reducing per-GPU decode reads","Replaces FlashAttention","Eliminates the KV cache"], answer: 1,
      explain: "TP shards weights → less per-GPU HBM traffic per token → lower decode latency." },
    { stem: "TP must run within one node because:", options: ["NVIDIA only allows it","NVLink bandwidth is needed for the per-layer all-reduce","Pipeline parallelism doesn't exist","Of legal restrictions"], answer: 1,
      explain: "All-reduce after every layer demands NVLink-class bandwidth (~900 GB/s). PCIe/IB are too slow." },
    { stem: "Llama-3-70B FP16 on tp=8: per-GPU weight shard is:", options: ["140 GB","70 GB","17.5 GB","8 GB"], answer: 2,
      explain: "140 / 8 = 17.5 GB. Fits in 80 GB H100 with room for KV cache." },
    { stem: "Pipeline parallelism splits the model:", options: ["Width-wise (within layers)","Depth-wise (across layers / stages)","By head","By precision"], answer: 1,
      explain: "Each stage holds a contiguous block of layers; activations flow stage→stage." },
    { stem: "A 'pipeline bubble' is:", options: ["A GPU manufacturing defect","Idle time in a stage waiting for inputs from a prior stage","Out-of-memory error","A cache eviction"], answer: 1,
      explain: "Mitigated by running many micro-batches concurrently; bubble fraction ≈ (stages-1)/microbatches." },
    { stem: "Which connection type is appropriate for cross-node pipeline parallelism?", options: ["NVLink only","PCIe Gen 3","InfiniBand","USB"], answer: 2,
      explain: "InfiniBand (~50 GB/s/NIC) handles activation transfer between stages." },
    { stem: "In a Mixture-of-Experts model with top-2 of 8 experts, each token activates:", options: ["All 8 experts","2 experts","1 expert","Depends on temperature"], answer: 1,
      explain: "Router picks top-K (typically 2) experts per token; that's the 'active parameters' count." },
    { stem: "Expert parallelism's biggest operational risk is:", options: ["Out of memory","Hot experts — uneven load creating stragglers","Slow weights","Quantization error"], answer: 1,
      explain: "Routers don't produce uniform distributions; capacity planning must accommodate worst-case expert load." },
    { stem: "Speculative decoding works by:", options: ["Lossy approximation","A small draft model proposes K tokens, the big model verifies all K in one parallel pass","Pre-computing all possible outputs","Skipping layers"], answer: 1,
      explain: "Converts memory-bound decode into a batched-style verification step; 2–3× typical speedup." },
    { stem: "Under proper speculative sampling, output quality vs vanilla decoding is:", options: ["Lower","Identical (provably)","Higher","Random"], answer: 1,
      explain: "Speculative sampling is provably equivalent to sampling from the target model alone." },
    { stem: "Static batching is wasteful primarily because:", options: ["It uses too much memory","New requests wait for the current batch to finish, and short outputs idle while long ones complete","It only works on CPU","It can't use TP"], answer: 1,
      explain: "Continuous batching fixes both: admit at every step, evict on completion." },
    { stem: "Continuous batching relies structurally on:", options: ["FP8 weights","Block-based KV-cache allocation (PagedAttention)","Speculative decoding","CPU offload"], answer: 1,
      explain: "Variable-sized, dynamically allocated KV slots demand block allocation; that's why vLLM ships both." },
    { stem: "vLLM is most associated with:", options: ["Pipeline parallelism","PagedAttention","INT8 quantization","Expert parallelism"], answer: 1,
      explain: "vLLM's UC Berkeley team introduced PagedAttention." },
    { stem: "Plain PyTorch is typically ___ slower than vLLM for serving:", options: ["No different","About 5–10×","100×","Faster"], answer: 1,
      explain: "Missing: continuous batching, PagedAttention, FlashAttention, quantization, fused kernels." },
    { stem: "Pick the BEST default engine choice for an OSS NVIDIA deployment with broad model support:", options: ["vLLM","TGI","TensorRT-LLM","SGLang"], answer: 0,
      explain: "vLLM is the OSS default; TensorRT-LLM if you need NVIDIA peak; SGLang for tool/JSON-heavy." }
  ]
};
const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
$("#eyebrow").textContent = "Canonical quiz · the bar"; $("#title").textContent = QUIZ.title;
$("#sub").textContent = `${QUIZ.questions.length} questions · pass ${Math.round(QUIZ.pass*100)}%`;
$("#quiz").innerHTML = QUIZ.questions.map((q,i)=>`<div class="q" id="q${i}"><p class="stem"><span class="num">Q${i+1}</span>${esc(q.stem)}<span class="mark" id="m${i}"></span></p>${q.options.map((o,j)=>`<label class="opt"><input type="radio" name="q${i}" value="${j}"><span>${esc(o)}</span></label>`).join("")}<p class="explain">${esc(q.explain)}</p></div>`).join("");
$("#check").addEventListener("click",()=>{ let correct=0; QUIZ.questions.forEach((q,i)=>{ const picked=document.querySelector(`input[name="q${i}"]:checked`); const qel=$("#q"+i), mel=$("#m"+i); qel.classList.add("graded"); const ok = picked && Number(picked.value)===q.answer; if(ok){correct++;qel.classList.add("correct");qel.classList.remove("wrong");mel.textContent="✓ correct";mel.className="mark ok";} else{qel.classList.add("wrong");qel.classList.remove("correct");mel.textContent=picked?"✗ incorrect":"— no answer";mel.className="mark bad";} }); const total=QUIZ.questions.length, passed=correct/total>=QUIZ.pass; const r=$("#result"); r.classList.add("show"); r.innerHTML=`<div class="score">${correct} / ${total}</div><div class="${passed?"verdict-pass":"verdict-fail"}">${passed?"PASSED — record it and move on":"below the bar — review the lesson and retry"}</div>`; r.scrollIntoView({behavior:"smooth",block:"nearest"}); });
</script>
</body>
</html>
