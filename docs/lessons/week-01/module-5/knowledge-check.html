<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiz — Week 1 · Orientation</title>
<style>
  :root{
    --bg:#0b0d10;--surface:#14171d;--surface-2:#1b1f27;--line:rgba(255,255,255,.08);
    --text:#e7e9ee;--muted:#8b91a0;--faint:#5b616e;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    --ok:#34d399;--bad:#fb7185;--accent:#22d3ee;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.5;padding:40px 20px 80px}
  .wrap{max-width:720px;margin:0 auto}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin:0 0 6px}
  h1{font-family:var(--mono);font-weight:600;font-size:22px;margin:0 0 4px}
  .sub{color:var(--muted);font-size:13px;margin:0 0 24px}
  .q{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:14px}
  .q .stem{font-weight:600;margin:0 0 14px}
  .q .num{font-family:var(--mono);color:var(--faint);font-size:12px;margin-right:8px}
  label.opt{display:flex;gap:10px;align-items:flex-start;padding:9px 12px;border:1px solid var(--line);border-radius:8px;margin-bottom:8px;cursor:pointer}
  label.opt:hover{background:var(--surface-2)}
  label.opt input{margin-top:3px;accent-color:var(--accent)}
  .q.correct{border-color:color-mix(in srgb,var(--ok) 50%,transparent)}
  .q.wrong{border-color:color-mix(in srgb,var(--bad) 50%,transparent)}
  .explain{font-size:13px;color:var(--muted);margin:10px 0 0;padding-top:10px;border-top:1px solid var(--line);display:none}
  .q.graded .explain{display:block}
  .mark{font-family:var(--mono);font-size:12px;margin-left:8px}
  .mark.ok{color:var(--ok)} .mark.bad{color:var(--bad)}
  button{font-family:var(--mono);font-size:14px;background:var(--accent);color:#04181c;border:0;border-radius:8px;padding:11px 20px;cursor:pointer;font-weight:600}
  button:hover{filter:brightness(1.08)}
  #result{margin-top:18px;font-family:var(--mono);font-size:15px;display:none}
  #result.show{display:block}
  #result .score{font-size:24px;font-weight:600}
  .verdict-pass{color:var(--ok)} .verdict-fail{color:var(--bad)}
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow" id="eyebrow"></p>
  <h1 id="title"></h1>
  <p class="sub" id="sub"></p>
  <div id="quiz"></div>
  <button id="check">Check answers</button>
  <div id="result"></div>
</div>

<script>
/* ===========================================================================
   CANONICAL QUIZ — single self-contained gradable format (see §7 of the plan).
   To author a new quiz (canonical or oxcode practice), replace QUIZ below.
   Format: questions + embedded answer key + client-side grading, one file.
   Quizzes are formative; the key shipping in the file is acceptable.
   =========================================================================== */
/* Adapted from planning/source-material/Orientation/Review-Quiz.md.
   15 questions · pass = 10/15 (≈ 66%) · sections: Shell, Git, GPU primer.            */
const QUIZ = {
  module: "week-01/module-5",
  title: "Week 1 · Orientation (Friday canonical)",
  pass: 0.66,
  questions: [
    // ---------- Section A — Shell & Linux ----------
    {
      stem: "What does `ls -la | grep '.md' | wc -l` do?",
      options: [
        "Lists every Markdown file in the directory",
        "Counts every entry whose name (or details) contains '.md'",
        "Deletes Markdown files",
        "Opens Markdown files in a pager"
      ],
      answer: 1,
      explain: "ls -la lists everything; grep filters lines containing '.md'; wc -l counts the surviving lines."
    },
    {
      stem: "Which one-liner prints the second `:` -delimited field of `/etc/passwd`?",
      options: [
        "`cut -f2 /etc/passwd`",
        "`awk -F':' '{print $2}' /etc/passwd`",
        "`grep ':' /etc/passwd | head -2`",
        "`sed 's/:/ /' /etc/passwd`"
      ],
      answer: 1,
      explain: "awk with -F':' sets the field separator; $2 is the second column."
    },
    {
      stem: "What's the difference between `>` and `>>` when redirecting to a file?",
      options: [
        "No difference",
        "`>` appends; `>>` truncates",
        "`>` truncates and writes; `>>` appends",
        "`>` writes to stderr; `>>` writes to stdout"
      ],
      answer: 2,
      explain: "Single arrow replaces file contents; double arrow appends to whatever is already there."
    },
    {
      stem: "Why would you run `chmod +x my_script.sh`?",
      options: [
        "To make the file readable",
        "To mark the script executable so you can run it directly",
        "To compress the script",
        "To attach it to a cron job"
      ],
      answer: 1,
      explain: "+x adds the execute bit; without it you'd need to invoke an interpreter explicitly."
    },
    {
      stem: "What does `$(date +%F)` evaluate to?",
      options: [
        "The literal string `date +%F`",
        "Today's date in `YYYY-MM-DD` format",
        "An error",
        "The current Unix timestamp"
      ],
      answer: 1,
      explain: "$( ... ) runs the command and substitutes its output; %F is the ISO date format."
    },
    // ---------- Section B — Git Workflow ----------
    {
      stem: "Which conventional-commit type fits 'Add a new benchmark script'?",
      options: ["`docs:`", "`fix:`", "`feat:`", "`chore:`"],
      answer: 2,
      explain: "New functionality is `feat:`."
    },
    {
      stem: "Which of these is the WRONG thing to do?",
      options: [
        "`git checkout -b feat/new-thing`",
        "`git commit -m \"wip\"`",
        "`git push -u origin feat/new-thing`",
        "`git checkout main && git pull`"
      ],
      answer: 1,
      explain: "`wip` is not a useful commit message — use conventional-commit format with a real description."
    },
    {
      stem: "You committed to the wrong branch, haven't pushed yet. The cleanest recovery is:",
      options: [
        "Force-push to main and hope",
        "Create the correct branch from current HEAD, then `git reset --hard HEAD~1` on the wrong branch",
        "Delete the repo and re-clone",
        "Open a PR from the wrong branch"
      ],
      answer: 1,
      explain: "Preserve the work on a new branch first, then rewind the wrong branch."
    },
    {
      stem: "Why do teams use PRs instead of pushing straight to `main`?",
      options: [
        "PRs are required by GitHub for free accounts",
        "To invite review, run CI, and enforce branch protection",
        "PRs are faster than direct pushes",
        "PRs avoid the need for commit messages"
      ],
      answer: 1,
      explain: "PRs are the review + CI + protection gate; direct push skips all three."
    },
    {
      stem: "Your branch and `main` both touched the same line of the same file. On merge, what happens?",
      options: [
        "Git silently picks `main`",
        "Git silently picks your branch",
        "Git stops with a merge conflict; `git status` lists the conflicting files",
        "The repo becomes corrupted"
      ],
      answer: 2,
      explain: "Concurrent edits to the same lines produce a conflict you resolve by hand."
    },
    // ---------- Section C — GPU & AI Primer ----------
    {
      stem: "Why is a GPU faster than a CPU for matrix multiplication?",
      options: [
        "GPUs have higher clock speeds than CPUs",
        "GPUs have thousands of parallel cores; matrix multiplies are independent multiply-adds done in parallel",
        "GPUs use less memory than CPUs",
        "GPUs cache the model weights on-chip"
      ],
      answer: 1,
      explain: "Parallelism over thousands of small cores is the structural reason."
    },
    {
      stem: "Roughly, what memory + bandwidth does an H100 SXM5 have?",
      options: [
        "16 GB DDR5, 100 GB/s",
        "40 GB HBM2, 1 TB/s",
        "80 GB HBM3, ~3.35 TB/s",
        "192 GB HBM3e, ~8 TB/s"
      ],
      answer: 2,
      explain: "80 GB HBM3 and ~3.35 TB/s — numbers you'll re-use in Week 2."
    },
    {
      stem: "Pick TWO structural differences between training and serving (inference).",
      options: [
        "Training is rare/batch; serving is continuous/per-user",
        "Training is latency-sensitive; serving is throughput-only",
        "Training updates weights; serving just reads them",
        "Training is per-user real-time; serving is offline"
      ],
      answer: 0,
      explain: "Options A and C are both correct; option A is the single best summary. (B and D have the two sports swapped.)"
    },
    {
      stem: "Put these inference-pipeline stages in order:",
      options: [
        "tokenize → embed → layers → logits → sample",
        "embed → tokenize → sample → layers → logits",
        "layers → tokenize → embed → sample → logits",
        "sample → logits → layers → embed → tokenize"
      ],
      answer: 0,
      explain: "Text → tokens → vectors → transformer layers → logits → sampled token."
    },
    {
      stem: "True or false: a CPU is always worse than a GPU for AI workloads.",
      options: [
        "True — GPUs always win",
        "False — CPUs are better for sequential, branch-heavy, or small-batch work where parallelism doesn't amortize",
        "True — except for training",
        "False — only for training"
      ],
      answer: 1,
      explain: "GPUs win only when work is parallel and large enough to amortize memory transfer cost."
    }
  ]
};

const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

$("#eyebrow").textContent = "Canonical quiz · the bar";
$("#title").textContent = QUIZ.title;
$("#sub").textContent = `${QUIZ.questions.length} questions · pass ${Math.round(QUIZ.pass*100)}%`;

$("#quiz").innerHTML = QUIZ.questions.map((q,i)=>`
  <div class="q" id="q${i}">
    <p class="stem"><span class="num">Q${i+1}</span>${esc(q.stem)}<span class="mark" id="m${i}"></span></p>
    ${q.options.map((o,j)=>`
      <label class="opt"><input type="radio" name="q${i}" value="${j}"><span>${esc(o)}</span></label>`).join("")}
    <p class="explain">${esc(q.explain)}</p>
  </div>`).join("");

$("#check").addEventListener("click",()=>{
  let correct=0;
  QUIZ.questions.forEach((q,i)=>{
    const picked=document.querySelector(`input[name="q${i}"]:checked`);
    const qel=$("#q"+i), mel=$("#m"+i);
    qel.classList.add("graded");
    const ok = picked && Number(picked.value)===q.answer;
    if(ok){correct++;qel.classList.add("correct");qel.classList.remove("wrong");mel.textContent="✓ correct";mel.className="mark ok";}
    else{qel.classList.add("wrong");qel.classList.remove("correct");mel.textContent=picked?"✗ incorrect":"— no answer";mel.className="mark bad";}
  });
  const total=QUIZ.questions.length, passed=correct/total>=QUIZ.pass;
  const r=$("#result"); r.classList.add("show");
  r.innerHTML=`<div class="score">${correct} / ${total}</div>
    <div class="${passed?"verdict-pass":"verdict-fail"}">${passed?"PASSED — record it and move on":"below the bar — review the lesson and retry"}</div>`;
  r.scrollIntoView({behavior:"smooth",block:"nearest"});
});
</script>
</body>
</html>
