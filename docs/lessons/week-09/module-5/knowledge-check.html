<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiz — Week 9 · Capsule Benchmarking & Evaluation</title>
<style>
  :root{--bg:#0b0d10;--surface:#14171d;--surface-2:#1b1f27;--line:rgba(255,255,255,.08);--text:#e7e9ee;--muted:#8b91a0;--faint:#5b616e;--mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;--ok:#34d399;--bad:#fb7185;--accent:#22d3ee;}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.5;padding:40px 20px 80px}
  .wrap{max-width:720px;margin:0 auto}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin:0 0 6px}
  h1{font-family:var(--mono);font-weight:600;font-size:22px;margin:0 0 4px} .sub{color:var(--muted);font-size:13px;margin:0 0 24px}
  .q{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:14px}
  .q .stem{font-weight:600;margin:0 0 14px} .q .num{font-family:var(--mono);color:var(--faint);font-size:12px;margin-right:8px}
  label.opt{display:flex;gap:10px;align-items:flex-start;padding:9px 12px;border:1px solid var(--line);border-radius:8px;margin-bottom:8px;cursor:pointer}
  label.opt:hover{background:var(--surface-2)} label.opt input{margin-top:3px;accent-color:var(--accent)}
  .q.correct{border-color:color-mix(in srgb,var(--ok) 50%,transparent)} .q.wrong{border-color:color-mix(in srgb,var(--bad) 50%,transparent)}
  .explain{font-size:13px;color:var(--muted);margin:10px 0 0;padding-top:10px;border-top:1px solid var(--line);display:none}
  .q.graded .explain{display:block} .mark{font-family:var(--mono);font-size:12px;margin-left:8px}
  .mark.ok{color:var(--ok)} .mark.bad{color:var(--bad)}
  button{font-family:var(--mono);font-size:14px;background:var(--accent);color:#04181c;border:0;border-radius:8px;padding:11px 20px;cursor:pointer;font-weight:600}
  button:hover{filter:brightness(1.08)} #result{margin-top:18px;font-family:var(--mono);font-size:15px;display:none} #result.show{display:block}
  #result .score{font-size:24px;font-weight:600} .verdict-pass{color:var(--ok)} .verdict-fail{color:var(--bad)}
</style>
</head>
<body>
<div class="wrap"><p class="eyebrow" id="eyebrow"></p><h1 id="title"></h1><p class="sub" id="sub"></p><div id="quiz"></div><button id="check">Check answers</button><div id="result"></div></div>
<script>
const QUIZ = {
  module: "week-09/module-5",
  title: "Week 9 · Capsule Benchmarking & Evaluation (Friday canonical)",
  pass: 0.66,
  questions: [
    { stem: "A benchmark run consists of three pieces:", options: ["GPU / CPU / RAM","Load generator / serving engine / metric collection","Prompt / response / score","Frontend / API / DB"], answer: 1, explain: "Plus the report.json output." },
    { stem: "After one benchmark run completes, you can claim:", options: ["This config beats all others","This config, this load, this moment produced these numbers — nothing more","The model is good","The engine is bad"], answer: 1, explain: "One data point isn't a comparison or a scaling law." },
    { stem: "A saturation curve plots:", options: ["Memory vs time","Throughput vs concurrency","Quality vs cost","TTFT vs model size"], answer: 1, explain: "The elbow = max useful concurrency before TTFT explodes." },
    { stem: "Past the elbow of a saturation curve, the metric that degrades fastest is:", options: ["Throughput","TTFT p99","GPU util","Memory"], answer: 1, explain: "Requests queue → TTFT explodes; throughput stays flat." },
    { stem: "Doubling TP from 1 to 2 on a large model usually produces:", options: ["Exactly 2× throughput","Sub-linear throughput gain due to comm overhead","No change","2× latency"], answer: 1, explain: "Comm cost eats some of the parallelism win — Week 4." },
    { stem: "FP8 vs FP16 typically:", options: ["Lowers throughput","Raises throughput ~1.5–2× and may slightly reduce quality","Improves quality","No effect"], answer: 1, explain: "Memory bandwidth + compute density up; precision down a bit." },
    { stem: "The single most common confounding variable in back-to-back benchmarks on one node is:", options: ["Phase of the moon","Thermal throttling / no warmup / cache reuse / other users","Internet speed","Your laptop"], answer: 1, explain: "Mitigate with pauses, warmups, cache clears, lease verification." },
    { stem: "Throughput is not quality because:", options: ["Throughput is always wrong","A fast config that gives worse answers is a worse config","Quality is faster","They mean the same thing"], answer: 1, explain: "Run a 5–10 prompt eval suite alongside every config change." },
    { stem: "The minimum useful prompt-eval suite size is approximately:", options: ["1","5–10 curated probes covering correctness, refusals, safety, format, hallucination","100","1000"], answer: 1, explain: "Enough for a smoke test that catches regressions." },
    { stem: "For a human-facing chat product, target TTFT and ITL are roughly:", options: ["Doesn't matter","TTFT < ~600 ms, ITL ~30–60 tok/s (reading pace)","TTFT < 10 ms always","Match a database"], answer: 1, explain: "Felt latency differs from measured latency." },
    { stem: "`capsule schedule` lets you:", options: ["Nothing","Run benchmarks on a cron, on auto-leased nodes, with audit","Order pizza","Replace MCP"], answer: 1, explain: "Cron + auto-lease + audit + log per run." },
    { stem: "Nightly scheduled benchmarks primarily catch:", options: ["Cosmic rays","Regressions between commits, model versions, or infra changes","User complaints","Sales spikes"], answer: 1, explain: "Without a baseline you only learn about regressions from users." },
    { stem: "Capsule's MCP surface lets:", options: ["Only humans use it","An agent (Claude/OxCode/Cursor) call benchmark + lease tools through a standard protocol","Capsule reach the internet","More GPUs appear"], answer: 1, explain: "Week 7's tool-design vocabulary applies directly." },
    { stem: "A benchmark-running agent needs which Week-7 governance controls (most critical)?", options: ["None","Lease-time cap, cost budget, scoped credentials, audit trail","Bigger model","More GPUs"], answer: 1, explain: "Write tools (lease, kick benchmark) need bounded blast radius." },
    { stem: "By the end of Week 9 you can defend a benchmark result in:", options: ["No vocabulary","Phase 1 vocabulary (TTFT, ITL, throughput, memory vs compute bound, batching, TP, quant)","Marketing language","Random jargon"], answer: 1, explain: "That's the whole point of Weeks 1–5 made operational." }
  ]
};
const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
$("#eyebrow").textContent = "Canonical quiz · the bar"; $("#title").textContent = QUIZ.title;
$("#sub").textContent = `${QUIZ.questions.length} questions · pass ${Math.round(QUIZ.pass*100)}%`;
$("#quiz").innerHTML = QUIZ.questions.map((q,i)=>`<div class="q" id="q${i}"><p class="stem"><span class="num">Q${i+1}</span>${esc(q.stem)}<span class="mark" id="m${i}"></span></p>${q.options.map((o,j)=>`<label class="opt"><input type="radio" name="q${i}" value="${j}"><span>${esc(o)}</span></label>`).join("")}<p class="explain">${esc(q.explain)}</p></div>`).join("");
$("#check").addEventListener("click",()=>{ let correct=0; QUIZ.questions.forEach((q,i)=>{ const picked=document.querySelector(`input[name="q${i}"]:checked`); const qel=$("#q"+i), mel=$("#m"+i); qel.classList.add("graded"); const ok = picked && Number(picked.value)===q.answer; if(ok){correct++;qel.classList.add("correct");qel.classList.remove("wrong");mel.textContent="✓ correct";mel.className="mark ok";} else{qel.classList.add("wrong");qel.classList.remove("correct");mel.textContent=picked?"✗ incorrect":"— no answer";mel.className="mark bad";} }); const total=QUIZ.questions.length, passed=correct/total>=QUIZ.pass; const r=$("#result"); r.classList.add("show"); r.innerHTML=`<div class="score">${correct} / ${total}</div><div class="${passed?"verdict-pass":"verdict-fail"}">${passed?"PASSED":"below the bar — review the lesson and retry"}</div>`; r.scrollIntoView({behavior:"smooth",block:"nearest"}); });
</script>
</body>
</html>
