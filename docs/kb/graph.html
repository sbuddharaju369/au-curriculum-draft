<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Curriculum Map — Oxmiq × AU Internship</title>
<style>
  /* ---- config-free, dependency-free, offline-safe ---- */
  :root {
    /* OxBlood — OXMIQ brand tokens (light / cream) */
    --bg: #F5F0E4;            /* cream — page background */
    --surface: #EFEADD;       /* section panels */
    --surface-2: #FBF9F3;     /* cards — lift off the cream */
    --line: rgba(26,26,26,.10);
    --line-strong: rgba(26,26,26,.22);
    --text: #1A1A1A;
    --muted: #666666;
    --faint: #9C9486;
    --mono: "Oxygen Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    --sans: "Oxygen", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;

    /* phase ramp — restrained, brand-only (oxblood is the functional highlight, not wallpaper) */
    --p-orientation: #666666;  /* mid-gray — onboarding */
    --p-inference:   #8B0000;  /* oxblood — flagship phase */
    --p-agents:      #C4992B;  /* gold */
    --p-bridge:      #2D2926;  /* charcoal */
    --p-capsule:     #2E7D32;  /* green */
    --p-capstone:    #1A1A1A;  /* near-black — capstone */

    --ok: #2E7D32;   /* passed */
    --wip: #C4992B;  /* in progress */
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(139,0,0,.06), transparent 60%),
      linear-gradient(rgba(26,26,26,.035) 1px, transparent 1px) 0 0 / 100% 40px,
      var(--bg);
    color: var(--text);
    font-family: var(--sans);
    line-height: 1.5;
    padding: 40px 20px 80px;
  }
  .wrap { max-width: 860px; margin: 0 auto; }

  /* ---- header ---- */
  header { margin-bottom: 28px; }
  .eyebrow {
    font-family: var(--mono); font-size: 12px; letter-spacing: .18em;
    text-transform: uppercase; color: var(--p-inference); margin: 0 0 8px;
  }
  h1 { font-family: var(--mono); font-weight: 600; font-size: 26px; margin: 0 0 4px; letter-spacing: -.01em; }
  .sub { color: var(--muted); font-size: 14px; margin: 0; }
  .switch { font-family: var(--mono); font-size: 12px; margin: 14px 0 0; display: flex; gap: 6px; align-items: center; }
  .switch a { color: var(--muted); text-decoration: none; border: 1px solid var(--line); border-radius: 7px; padding: 5px 11px; }
  .switch a.active { color: var(--text); border-color: var(--line-strong); background: var(--surface); }
  .switch a:hover { color: var(--text); }

  .overall {
    margin-top: 20px; padding: 16px 18px; background: var(--surface);
    border: 1px solid var(--line); border-radius: 12px;
    display: flex; align-items: center; gap: 16px;
  }
  .overall .pct { font-family: var(--mono); font-size: 22px; font-weight: 600; min-width: 64px; }
  .overall .bar-wrap { flex: 1; }
  .overall .label { font-size: 12px; color: var(--muted); font-family: var(--mono); margin-bottom: 6px; }

  .track { height: 7px; border-radius: 99px; background: #E6DFCF; overflow: hidden; }
  .fill { height: 100%; border-radius: 99px; transition: width .6s ease; }

  /* ---- legend ---- */
  .legend { display: flex; flex-wrap: wrap; gap: 6px 14px; margin-top: 16px; font-family: var(--mono); font-size: 11px; }
  .legend span { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
  .dot { width: 9px; height: 9px; border-radius: 99px; display: inline-block; }

  /* ---- week (details) ---- */
  details.week {
    background: var(--surface); border: 1px solid var(--line);
    border-left: 3px solid var(--phase); border-radius: 10px;
    margin-bottom: 10px; overflow: hidden;
  }
  @keyframes rise { from { transform: translateY(8px); } to { transform: none; } }
  @media (prefers-reduced-motion: no-preference) { details.week { animation: rise .4s ease both; } }
  details.week > summary {
    list-style: none; cursor: pointer; padding: 14px 18px;
    display: grid; grid-template-columns: auto 1fr auto; gap: 14px; align-items: center;
  }
  summary::-webkit-details-marker { display: none; }
  .wk-num { font-family: var(--mono); font-size: 12px; color: var(--phase); border: 1px solid var(--line-strong); border-radius: 6px; padding: 4px 8px; white-space: nowrap; }
  .wk-title { font-weight: 600; font-size: 15px; }
  .wk-theme { color: var(--muted); font-size: 12.5px; }
  .wk-right { display: flex; align-items: center; gap: 12px; min-width: 150px; justify-content: flex-end; }
  .wk-right .track { width: 90px; }
  .wk-right .wk-pct { font-family: var(--mono); font-size: 12px; color: var(--muted); min-width: 34px; text-align: right; }
  .chev { width: 16px; height: 16px; color: var(--faint); transition: transform .2s ease; flex-shrink: 0; }
  details[open] .chev { transform: rotate(90deg); }

  /* ---- modules ---- */
  .modules { padding: 4px 14px 14px 14px; }
  .mod {
    display: grid; grid-template-columns: auto auto 1fr auto; gap: 12px; align-items: center;
    padding: 9px 12px; border-radius: 8px; text-decoration: none; color: inherit;
    border: 1px solid transparent;
  }
  .mod:hover { background: var(--surface-2); border-color: var(--line); }
  .mod .status { width: 16px; height: 16px; display: grid; place-items: center; }
  .st-passed { color: var(--ok); }
  .st-wip { color: var(--wip); }
  .st-dot { width: 7px; height: 7px; border-radius: 99px; background: var(--faint); }
  .mod.locked { opacity: .45; }
  .mod.locked:hover { background: transparent; border-color: transparent; cursor: default; }
  .mod.next { border-color: var(--phase); background: linear-gradient(90deg, color-mix(in srgb, var(--phase) 12%, transparent), transparent); }
  .day { font-family: var(--mono); font-size: 11px; color: var(--faint); min-width: 30px; }
  .mod-title { font-size: 14px; }
  .tag { font-family: var(--mono); font-size: 10px; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); border: 1px solid var(--line); border-radius: 5px; padding: 2px 6px; }
  .next-flag { font-family: var(--mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--phase); }

  footer { margin-top: 24px; color: var(--faint); font-size: 12px; font-family: var(--mono); }
  .err { background: #F7E7E4; border: 1px solid #E0B4AE; color: #8B0000; padding: 16px; border-radius: 10px; font-family: var(--mono); font-size: 13px; }
  .err code { color: #6B0000; }

  @media (prefers-reduced-motion: reduce) {
    details.week { animation: none; }
    .fill, .chev { transition: none; }
  }
  @media (max-width: 560px) {
    .wk-theme { display: none; }
    .overall { flex-direction: column; align-items: stretch; }
  }
</style>
</head>
<body>
<div class="wrap" id="app">
  <p style="font-family:var(--mono);color:var(--muted)">Loading curriculum…</p>
</div>

<script>
/* ============================================================
   CONFIG — point these at where the JSON lives in your mkdocs site.
   Defaults assume graph.json + summary.json sit NEXT TO this page
   (so `python3 -m http.server` in one folder previews it instantly).
   In the repo (page at kb/graph.html): set SUMMARY_URL = "../progress/summary.json".
   ============================================================ */
const GRAPH_URL   = "graph.json";                 // sits next to this page in kb/
const SUMMARY_URL = "../progress/summary.json";   // student-owned progress at repo root
const LESSON_BASE = "../";                         // this page lives in kb/, lessons/ is at repo root

const PHASE_COLOR = {
  orientation: "var(--p-orientation)",
  inference:   "var(--p-inference)",
  agents:      "var(--p-agents)",
  bridge:      "var(--p-bridge)",
  capsule:     "var(--p-capsule)",
  capstone:    "var(--p-capstone)",
};

const esc = s => String(s).replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
const lessonHref = m => LESSON_BASE + String(m.lesson || "").replace(/index\.md$/, "");

async function load() {
  const app = document.getElementById("app");
  let graph, summary;
  try {
    [graph, summary] = await Promise.all([
      fetch(GRAPH_URL).then(r => { if (!r.ok) throw new Error(GRAPH_URL); return r.json(); }),
      fetch(SUMMARY_URL).then(r => r.ok ? r.json() : { modules:{}, weeks:{}, overall:{} }).catch(() => ({ modules:{}, weeks:{}, overall:{} })),
    ]);
  } catch (e) {
    app.innerHTML = `<div class="err">Couldn't load <code>${esc(e.message)}</code>.<br><br>
      This page reads its data over HTTP — open it through a server, not as a file://.<br>
      Quick local preview: <code>python3 -m http.server 8000</code> in this folder, then visit
      <code>http://localhost:8000/graph.html</code>. In the repo it's served by <code>mkdocs serve</code>.</div>`;
    return;
  }
  render(graph, summary);
}

function statusOf(summary, id) {
  return (summary.modules && summary.modules[id] && summary.modules[id].status) || "not_started";
}

function render(graph, summary) {
  const app = document.getElementById("app");

  // flatten modules in day order to compute "next up" + locked states
  const all = [];
  graph.weeks.forEach(w => w.modules.forEach(m => all.push({ ...m, week: w })));
  all.sort((a, b) => (a.day || 0) - (b.day || 0));
  const passed = id => statusOf(summary, id) === "passed";
  const prereqsMet = m => (m.prereqs || []).every(passed);
  let nextId = null;
  for (const m of all) {
    if (statusOf(summary, m.id) !== "passed" && prereqsMet(m)) { nextId = m.id; break; }
  }

  const overall = summary.overall || {};
  const phaseTitle = {};
  (graph.phases || []).forEach(p => phaseTitle[p.id] = p.title);

  let html = `
    <header>
      <p class="eyebrow">${esc(graph.program || "Curriculum")}</p>
      <h1>Curriculum Map</h1>
      <p class="sub">${graph.weeks.length} weeks · ${all.length} sessions · pick the next concept and go</p>
      <div class="switch">
        <span style="color:var(--faint)">view:</span>
        <a href="graph.html" class="active">Tree</a>
        <a href="edge-graph.html">Graph</a>
        <a href="timeline.html">Timeline</a>
      </div>
      <div class="overall">
        <div class="pct">${overall.percent != null ? overall.percent + "%" : "—"}</div>
        <div class="bar-wrap">
          <div class="label">overall progress · ${overall.completed ?? 0}/${overall.total ?? all.length} complete</div>
          <div class="track"><div class="fill" style="width:${overall.percent || 0}%;background:var(--p-inference)"></div></div>
        </div>
      </div>
      <div class="legend">
        ${(graph.phases || []).map(p => `<span><i class="dot" style="background:${PHASE_COLOR[p.id] || "var(--muted)"}"></i>${esc(p.title)}</span>`).join("")}
        <span><i class="dot" style="background:var(--ok)"></i>Passed</span>
        <span><i class="dot" style="background:var(--wip)"></i>In progress</span>
      </div>
    </header>
    <main>`;

  graph.weeks.forEach((w, i) => {
    const color = PHASE_COLOR[w.phase] || "var(--muted)";
    const wp = (summary.weeks && summary.weeks[w.id]) || {};
    const pct = wp.percent || 0;
    const open = pct > 0 && pct < 100 ? "open" : "";   // auto-open the week in progress

    const mods = w.modules.map(m => {
      const st = statusOf(summary, m.id);
      const isNext = m.id === nextId;
      const locked = st === "not_started" && !prereqsMet(m) && !isNext;
      let icon;
      if (st === "passed") icon = `<span class="status st-passed">✓</span>`;
      else if (st === "in_progress") icon = `<span class="status st-wip">◐</span>`;
      else icon = `<span class="status"><i class="st-dot"></i></span>`;

      const tag = m.type && m.type !== "concept"
        ? `<span class="tag">${esc(m.type)}</span>`
        : (isNext ? `<span class="next-flag">next ▸</span>` : "");

      const cls = `mod${isNext ? " next" : ""}${locked ? " locked" : ""}`;
      const tagEl = locked ? `<span class="tag">locked</span>` : tag;
      const inner = `${icon}<span class="day">D${m.day ?? "?"}</span><span class="mod-title">${esc(m.title)}</span>${tagEl}`;
      return locked
        ? `<div class="${cls}" style="--phase:${color}">${inner}</div>`
        : `<a class="${cls}" style="--phase:${color}" href="${esc(lessonHref(m))}">${inner}</a>`;
    }).join("");

    html += `
      <details class="week" ${open} style="--phase:${color};animation-delay:${i * 45}ms">
        <summary>
          <span class="wk-num">WK ${String(w.number).padStart(2, "0")}</span>
          <span>
            <span class="wk-title">${esc(w.title)}</span>
            <span class="wk-theme"> · ${esc(phaseTitle[w.phase] || "")}</span>
          </span>
          <span class="wk-right">
            <span class="track"><span class="fill" style="width:${pct}%;background:${color}"></span></span>
            <span class="wk-pct">${pct}%</span>
            <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
          </span>
        </summary>
        <div class="modules">${mods}</div>
      </details>`;
  });

  html += `</main>
    <footer>v1 collapsible tree · reads graph.json + summary.json · edge-graph view is the fast-follow on the same data</footer>`;

  app.innerHTML = html;
}

load();
</script>
</body>
</html>
