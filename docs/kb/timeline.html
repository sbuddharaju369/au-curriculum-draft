<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Progress — Oxmiq × AU Internship</title>
<style>
  :root{
    --bg:#F5F0E4;--surface:#EFEADD;--surface-2:#FBF9F3;--line:rgba(26,26,26,.10);
    --line-strong:rgba(26,26,26,.22);--text:#1A1A1A;--muted:#666666;--faint:#9C9486;
    --mono:"Oxygen Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:"Oxygen",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    --ok:#2E7D32;--wip:#C4992B;--next:#8B0000;--track:#E6DFCF;
    --p-orientation:#666666;--p-inference:#8B0000;--p-agents:#C4992B;
    --p-bridge:#2D2926;--p-capsule:#2E7D32;--p-capstone:#1A1A1A;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:
      radial-gradient(1200px 600px at 50% -10%,rgba(139,0,0,.06),transparent 60%),
      linear-gradient(rgba(26,26,26,.035) 1px,transparent 1px) 0 0/100% 40px,
      var(--bg);
    color:var(--text);font-family:var(--sans);line-height:1.5;padding:40px 20px 80px;
  }
  .wrap{max-width:1000px;margin:0 auto}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--next);margin:0 0 8px}
  h1{font-family:var(--mono);font-weight:600;font-size:26px;margin:0 0 4px;letter-spacing:-.01em}
  .sub{color:var(--muted);font-size:14px;margin:0}
  .switch{font-family:var(--mono);font-size:12px;margin:14px 0 0;display:flex;gap:6px;align-items:center}
  .switch a{color:var(--muted);text-decoration:none;border:1px solid var(--line);border-radius:7px;padding:5px 11px}
  .switch a.active{color:var(--text);border-color:var(--line-strong);background:var(--surface)}
  .switch a:hover{color:var(--text)}

  /* stat cards */
  .stats{display:flex;flex-wrap:wrap;gap:12px;margin:22px 0 8px}
  .stat{flex:1;min-width:150px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:15px 18px}
  .stat .n{font-family:var(--mono);font-size:24px;font-weight:600;line-height:1.1}
  .stat .n small{font-size:14px;color:var(--muted);font-weight:400}
  .stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono);margin-top:4px}
  .stat.now{border-color:color-mix(in srgb,var(--next) 45%,transparent);background:color-mix(in srgb,var(--next) 7%,var(--surface))}
  .stat.now .n{font-size:15px;color:var(--next)}
  .stat.now .n .d{font-family:var(--mono);font-size:12px;color:var(--faint);margin-right:6px}

  .legend{display:flex;flex-wrap:wrap;gap:6px 16px;margin:14px 0 4px;font-family:var(--mono);font-size:11px}
  .legend span{display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .swatch{width:13px;height:13px;border-radius:4px;display:inline-block;border:1px solid var(--line-strong)}

  /* timeline */
  .timeline{margin-top:14px;display:flex;flex-direction:column;gap:8px}
  .wk{display:grid;grid-template-columns:170px 1fr;gap:14px;align-items:center;background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--phase);border-radius:10px;padding:12px 16px}
  .wk-meta .num{font-family:var(--mono);font-size:11px;color:var(--phase);letter-spacing:.06em}
  .wk-meta .ttl{font-weight:600;font-size:13.5px;margin-top:2px}
  .wk-meta .mini{height:5px;border-radius:99px;background:var(--track);overflow:hidden;margin-top:8px}
  .wk-meta .mini i{display:block;height:100%;border-radius:99px;background:var(--phase)}
  .cells{display:flex;flex-wrap:wrap;gap:7px}
  .cell{position:relative;width:74px;min-height:46px;border-radius:8px;border:1px solid var(--line-strong);background:var(--surface-2);padding:6px 8px;display:flex;flex-direction:column;justify-content:space-between;text-decoration:none;color:var(--text);transition:transform .12s ease,box-shadow .12s ease}
  a.cell:hover{transform:translateY(-2px);box-shadow:0 5px 14px rgba(26,26,26,.12)}
  .cell .d{font-family:var(--mono);font-size:10px;color:var(--faint)}
  .cell .g{font-size:12px;line-height:1}
  .cell .nm{font-size:10px;line-height:1.2;color:var(--muted);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .cell.passed{background:color-mix(in srgb,var(--ok) 16%,var(--surface-2));border-color:color-mix(in srgb,var(--ok) 45%,transparent)}
  .cell.passed .g{color:var(--ok)}
  .cell.wip{background:color-mix(in srgb,var(--wip) 16%,var(--surface-2));border-color:color-mix(in srgb,var(--wip) 55%,transparent)}
  .cell.wip .g{color:var(--wip)}
  .cell.next{background:color-mix(in srgb,var(--next) 10%,var(--surface-2));border-color:var(--next);box-shadow:0 0 0 2px color-mix(in srgb,var(--next) 35%,transparent)}
  .cell.next .nm{color:var(--next)}
  .cell.locked{opacity:.45}
  .nextflag{font-family:var(--mono);font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--next)}
  footer{margin-top:24px;color:var(--faint);font-size:12px;font-family:var(--mono)}
  .err{background:#F7E7E4;border:1px solid #E0B4AE;color:#8B0000;padding:16px;border-radius:10px;font-family:var(--mono);font-size:13px}
  .err code{color:#6B0000}
  @media (prefers-reduced-motion:reduce){.cell{transition:none}}
  @media (max-width:620px){.wk{grid-template-columns:1fr}.cell{width:calc(33.33% - 5px)}}
</style>
</head>
<body>
<div class="wrap" id="app">
  <p style="font-family:var(--mono);color:var(--muted)">Loading your progress…</p>
</div>

<script>
const GRAPH_URL="graph.json";
const SUMMARY_URL="../progress/summary.json";
const LESSON_BASE="../";
const PHASE_COLOR={orientation:"var(--p-orientation)",inference:"var(--p-inference)",agents:"var(--p-agents)",bridge:"var(--p-bridge)",capsule:"var(--p-capsule)",capstone:"var(--p-capstone)"};
const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const lessonHref=m=>LESSON_BASE+String(m.lesson||"").replace(/index\.md$/,"");
const statusOf=(s,id)=>(s.modules&&s.modules[id]&&s.modules[id].status)||"not_started";

async function load(){
  const app=document.getElementById("app");
  let graph,summary;
  try{
    [graph,summary]=await Promise.all([
      fetch(GRAPH_URL).then(r=>{if(!r.ok)throw new Error(GRAPH_URL);return r.json();}),
      fetch(SUMMARY_URL).then(r=>r.ok?r.json():{modules:{},weeks:{},overall:{}}).catch(()=>({modules:{},weeks:{},overall:{}}))
    ]);
  }catch(e){
    app.innerHTML=`<div class="err">Couldn't load <code>${esc(e.message)}</code>. Served by <code>mkdocs serve</code> — open over HTTP, not file://.</div>`;
    return;
  }
  render(graph,summary);
}

function render(graph,summary){
  const all=[];
  graph.weeks.forEach(w=>w.modules.forEach(m=>all.push({...m,week:w})));
  all.sort((a,b)=>(a.day||0)-(b.day||0));
  const passed=id=>statusOf(summary,id)==="passed";
  const prereqsMet=m=>(m.prereqs||[]).every(passed);
  let next=null;
  for(const m of all){ if(statusOf(summary,m.id)!=="passed"&&prereqsMet(m)){next=m;break;} }
  const o=summary.overall||{};
  const weeksDone=Object.values(summary.weeks||{}).filter(w=>w.percent===100).length;
  const phaseTitle={}; (graph.phases||[]).forEach(p=>phaseTitle[p.id]=p.title);

  const stats=`
    <div class="stats">
      <div class="stat"><div class="n">${o.percent??0}<small>%</small></div><div class="l">Overall</div></div>
      <div class="stat"><div class="n">${o.completed??0}<small> / ${o.total??all.length}</small></div><div class="l">Sessions passed</div></div>
      <div class="stat"><div class="n">${weeksDone}<small> / ${graph.weeks.length}</small></div><div class="l">Weeks complete</div></div>
      <div class="stat now"><div class="n">${next?`<span class="d">D${next.day}</span>${esc(next.title)}`:`✓ all done`}</div><div class="l">Up next</div></div>
    </div>`;

  const legend=`
    <div class="legend">
      <span><i class="swatch" style="background:color-mix(in srgb,var(--next) 12%,var(--surface-2));border-color:var(--next)"></i>Next</span>
      <span><i class="swatch" style="background:color-mix(in srgb,var(--ok) 16%,var(--surface-2));border-color:color-mix(in srgb,var(--ok) 45%,transparent)"></i>Passed</span>
      <span><i class="swatch" style="background:color-mix(in srgb,var(--wip) 16%,var(--surface-2));border-color:color-mix(in srgb,var(--wip) 55%,transparent)"></i>In progress</span>
      <span><i class="swatch" style="background:var(--surface-2)"></i>Available</span>
      <span><i class="swatch" style="background:var(--surface-2);opacity:.45"></i>Locked</span>
    </div>`;

  const rows=graph.weeks.map(w=>{
    const color=PHASE_COLOR[w.phase]||"var(--muted)";
    const pct=((summary.weeks&&summary.weeks[w.id])||{}).percent||0;
    const cells=w.modules.map(m=>{
      const st=statusOf(summary,m.id), isNext=next&&m.id===next.id;
      const locked=st==="not_started"&&!prereqsMet(m)&&!isNext;
      let cls="cell",g="";
      if(st==="passed"){cls+=" passed";g=`<span class="g">✓</span>`;}
      else if(st==="in_progress"){cls+=" wip";g=`<span class="g">◐</span>`;}
      else if(isNext){cls+=" next";g=`<span class="nextflag">next ▸</span>`;}
      else if(locked){cls+=" locked";g=`<span class="g" style="color:var(--faint)">•</span>`;}
      else {g=`<span class="g" style="color:var(--faint)">○</span>`;}
      const inner=`<div class="d">D${m.day??"?"}</div><div class="nm">${esc(m.title)}</div>${g}`;
      return locked
        ? `<div class="${cls}" style="--phase:${color}" title="${esc(m.title)} · locked">${inner}</div>`
        : `<a class="${cls}" style="--phase:${color}" href="${esc(lessonHref(m))}" title="${esc(m.title)}">${inner}</a>`;
    }).join("");
    return `<div class="wk" style="--phase:${color}">
      <div class="wk-meta">
        <div class="num">WK ${String(w.number).padStart(2,"0")} · ${esc(phaseTitle[w.phase]||"")}</div>
        <div class="ttl">${esc(w.title)}</div>
        <div class="mini"><i style="width:${pct}%"></i></div>
      </div>
      <div class="cells">${cells}</div>
    </div>`;
  }).join("");

  document.getElementById("app").innerHTML=`
    <header>
      <p class="eyebrow">${esc(graph.program||"Curriculum")}</p>
      <h1>My Progress</h1>
      <p class="sub">Your ${all.length}-session timeline across ${graph.weeks.length} weeks — what you've cleared, where you are, what's next.</p>
      <div class="switch">
        <span style="color:var(--faint)">view:</span>
        <a href="graph.html">Tree</a>
        <a href="edge-graph.html">Graph</a>
        <a href="timeline.html" class="active">Timeline</a>
      </div>
    </header>
    ${stats}${legend}
    <div class="timeline">${rows}</div>
    <footer>your personal timeline · reads the same graph.json + summary.json as the map · cleared / current / locked derive from your progress</footer>`;
}
load();
</script>
</body>
</html>
